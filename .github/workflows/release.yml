name: Release CI

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  # Set the "NODE_AUTH_TOKEN" environmental variable that "actions/setup-node" uses as the "_authToken"
  # in the generated ".npmrc" file to authenticate to NPM registry.
  NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN_PUBLIC }}
  FORCE_COLOR: '3'
  HUSKY: '0'

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: [self-hosted, Linux]
    if: "!startsWith(github.event.head_commit.message, '🚀 release:')"
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Generate token
        id: auth
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.AUTH_APP_ID }}
          private-key: ${{ secrets.AUTH_APP_KEY }}

      - name: Setup GitHub CLI
        uses: sersoft-gmbh/setup-gh-cli-action@v3
        with:
          version: stable
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR
        run: npx @localazy/workflow-scripts@latest create-release-pr
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}

  publish-release:
    name: Publish Release
    runs-on: [self-hosted, Linux]
    if: "startsWith(github.event.head_commit.message, '🚀 release:')"
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Read root version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync extension versions to root
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          pnpm --filter=@localazy/directus-extension-localazy exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter=@localazy/directus-extension-localazy-automation exec npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build extensions
        run: pnpm run build

      - name: Publish @localazy/directus-extension-localazy
        run: pnpm --filter=@localazy/directus-extension-localazy publish --no-git-checks

      - name: Publish @localazy/directus-extension-localazy-automation
        run: pnpm --filter=@localazy/directus-extension-localazy-automation publish --no-git-checks

      - name: Generate token
        id: auth
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.AUTH_APP_ID }}
          private-key: ${{ secrets.AUTH_APP_KEY }}

      - name: Setup GitHub CLI
        uses: sersoft-gmbh/setup-gh-cli-action@v3
        with:
          version: stable
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create and push git tag
        id: git-tag
        run: npx @localazy/workflow-scripts@latest create-git-tag
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create GitHub Release
        run: npx @localazy/workflow-scripts@latest create-github-release "${{ steps.git-tag.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
